name: Testes Python

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  testar:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: gerenciador-de-tarefas

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: python -m pip install --upgrade pip

      - run: pip install flask pytest

      - run: python -m pytest
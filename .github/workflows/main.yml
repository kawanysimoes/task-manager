name: Testes Python

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  testar:

    runs-on: ubuntu-latest

    steps:
    - name: Baixar código
      uses: actions/checkout@v4

    - name: Instalar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Instalar dependências
      run: |
        pip install pytest

    - name: Executar testes
      run: |
        pytest
